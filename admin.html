<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>유림 텔레콤 관리자 페이지</title>
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

    :root{
      --bg:#0b1020;
      --panel:#131c33;
      --line:rgba(255,255,255,.10);
      --text:#f8fbff;
      --muted:#aebad3;
      --primary:#ff4f9f;
      --primary-2:#8a5cff;
      --danger:#ff5f6d;
      --ok:#39d98a;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      background:
        radial-gradient(circle at 20% 20%, rgba(255,79,159,.14), transparent 24%),
        radial-gradient(circle at 80% 10%, rgba(138,92,255,.14), transparent 22%),
        linear-gradient(180deg, #0a1020 0%, #0d1527 100%);
      color:var(--text);
      font-family:'Pretendard',sans-serif;
    }

    .wrap{
      max-width:1400px;
      margin:0 auto;
      padding:24px;
    }

    .top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:16px;
      margin-bottom:20px;
      flex-wrap:wrap;
    }

    .title{
      font-size:2rem;
      font-weight:900;
      letter-spacing:-0.04em;
    }

    .sub{
      color:var(--muted);
      margin-top:6px;
    }

    .actions{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
    }

    button{
      border:none;
      cursor:pointer;
      border-radius:14px;
      padding:12px 16px;
      font-weight:800;
      font-family:inherit;
    }

    .btn-primary{
      color:#fff;
      background:linear-gradient(135deg, var(--primary), var(--primary-2));
    }

    .btn-secondary{
      color:#fff;
      background:rgba(255,255,255,.08);
      border:1px solid var(--line);
    }

    .btn-danger{
      color:#fff;
      background:linear-gradient(135deg, #ff5f6d, #ff7f50);
    }

    .grid{
      display:grid;
      grid-template-columns:260px 1fr;
      gap:20px;
    }

    .sidebar,.panel{
      background:rgba(19,28,51,.88);
      border:1px solid var(--line);
      border-radius:24px;
    }

    .sidebar{
      padding:16px;
      height:fit-content;
      position:sticky;
      top:20px;
    }

    .menu{
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .menu button{
      text-align:left;
      background:rgba(255,255,255,.05);
      color:#fff;
      border:1px solid var(--line);
    }

    .menu button.active{
      background:linear-gradient(135deg, rgba(255,79,159,.20), rgba(138,92,255,.20));
    }

    .panel{padding:20px}

    .section-title{
      margin:0 0 6px;
      font-size:1.35rem;
      font-weight:900;
    }

    .section-desc{
      color:var(--muted);
      margin-bottom:18px;
    }

    .card{
      background:rgba(255,255,255,.04);
      border:1px solid var(--line);
      border-radius:20px;
      padding:16px;
      margin-bottom:16px;
    }

    .row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
      margin-bottom:14px;
    }

    .row-3{
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:14px;
      margin-bottom:14px;
    }

    .field{
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    .field label{
      font-size:.92rem;
      color:#e7efff;
      font-weight:700;
    }

    input,textarea,select{
      width:100%;
      border:1px solid var(--line);
      background:rgba(255,255,255,.05);
      color:#fff;
      border-radius:14px;
      padding:12px 14px;
      font:inherit;
      outline:none;
    }

    textarea{
      min-height:110px;
      resize:vertical;
    }

    .list{
      display:grid;
      gap:14px;
      margin-top:18px;
    }

    .item{
      border:1px solid var(--line);
      border-radius:18px;
      background:rgba(255,255,255,.04);
      padding:14px;
    }

    .item-top{
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:flex-start;
      margin-bottom:10px;
    }

    .item-title{
      font-weight:900;
      font-size:1.05rem;
    }

    .item-sub{
      color:var(--muted);
      font-size:.92rem;
      margin-top:4px;
      white-space:pre-line;
    }

    .item-actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .mini{
      padding:9px 12px;
      border-radius:12px;
      font-size:.9rem;
    }

    .status{
      margin-top:10px;
      font-size:.92rem;
      color:#dfe9ff;
    }

    .ok{ color:var(--ok); }
    .danger{ color:#ff9aa4; }

    .hidden{display:none !important}

    @media (max-width:960px){
      .grid{grid-template-columns:1fr}
      .sidebar{position:relative;top:auto}
      .row,.row-3{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div>
        <div class="title">유림 텔레콤 관리자 페이지</div>
        <div class="sub">구글시트 없이 직접 수정하고 저장하는 버전</div>
      </div>

      <div class="actions">
        <button class="btn-secondary" onclick="location.href='index.html'">홈페이지 보기</button>
        <button class="btn-danger" onclick="resetAllData()">전체 초기화</button>
        <button class="btn-primary" onclick="saveAll()">저장하기</button>
      </div>
    </div>

    <div class="grid">
      <aside class="sidebar">
        <div class="menu">
          <button class="active" data-tab="home">홈 배너 관리</button>
          <button data-tab="sop">SOP 관리</button>
          <button data-tab="edu">상품자료 관리</button>
          <button data-tab="test">테스트 관리</button>
        </div>
        <div class="status" id="saveStatus">저장 전</div>
      </aside>

      <section class="panel">
        <div class="tab-content" id="tab-home">
          <h2 class="section-title">홈 배너 관리</h2>
          <div class="section-desc">홈 화면 제목과 카드 문구를 수정합니다.</div>

          <div class="card">
            <div class="row">
              <div class="field">
                <label>배지 문구</label>
                <input id="homeBadge" />
              </div>
              <div class="field">
                <label>메인 제목</label>
                <input id="homeTitle" />
              </div>
            </div>

            <div class="row-3">
              <div class="field">
                <label>SOP 카드 제목</label>
                <input id="homeShortcut1Title" />
              </div>
              <div class="field">
                <label>상품자료 카드 제목</label>
                <input id="homeShortcut2Title" />
              </div>
              <div class="field">
                <label>테스트 카드 제목</label>
                <input id="homeShortcut3Title" />
              </div>
            </div>

            <div class="row-3">
              <div class="field">
                <label>SOP 카드 설명</label>
                <textarea id="homeShortcut1Desc"></textarea>
              </div>
              <div class="field">
                <label>상품자료 카드 설명</label>
                <textarea id="homeShortcut2Desc"></textarea>
              </div>
              <div class="field">
                <label>테스트 카드 설명</label>
                <textarea id="homeShortcut3Desc"></textarea>
              </div>
            </div>
          </div>
        </div>

        <div class="tab-content hidden" id="tab-sop">
          <h2 class="section-title">SOP 관리</h2>
          <div class="section-desc">이미지, 동영상, 태그까지 직접 입력합니다.</div>

          <div class="card">
            <div class="row-3">
              <div class="field">
                <label>챕터</label>
                <input id="sopChapter" />
              </div>
              <div class="field">
                <label>주제명</label>
                <input id="sopTopicTitle" />
              </div>
              <div class="field">
                <label>순서</label>
                <input id="sopOrder" type="number" />
              </div>
            </div>

            <div class="row">
              <div class="field">
                <label>요약 설명</label>
                <textarea id="sopSummary"></textarea>
              </div>
              <div class="field">
                <label>상세 내용</label>
                <textarea id="sopDetail"></textarea>
              </div>
            </div>

            <div class="row">
              <div class="field">
                <label>태그</label>
                <input id="sopTags" placeholder="쉼표 구분" />
              </div>
              <div class="field">
                <label>동영상 URL</label>
                <input id="sopVideo" placeholder="youtube / mp4 링크" />
              </div>
            </div>

            <div class="row-3">
              <div class="field">
                <label>이미지 URL 1</label>
                <input id="sopImage1" />
              </div>
              <div class="field">
                <label>이미지 URL 2</label>
                <input id="sopImage2" />
              </div>
              <div class="field">
                <label>이미지 URL 3</label>
                <input id="sopImage3" />
              </div>
            </div>

            <button class="btn-primary" onclick="addOrUpdateSop()">SOP 저장</button>
          </div>

          <div class="list" id="sopList"></div>
        </div>

        <div class="tab-content hidden" id="tab-edu">
          <h2 class="section-title">상품자료 관리</h2>
          <div class="section-desc">카테고리, 포인트, 이미지, 동영상을 입력합니다.</div>

          <div class="card">
            <div class="row-3">
              <div class="field">
                <label>카테고리</label>
                <input id="eduCategory" />
              </div>
              <div class="field">
                <label>제목</label>
                <input id="eduTitle" />
              </div>
              <div class="field">
                <label>동영상 URL</label>
                <input id="eduVideo" />
              </div>
            </div>

            <div class="row">
              <div class="field">
                <label>설명</label>
                <textarea id="eduDesc"></textarea>
              </div>
              <div class="field">
                <label>이미지 URL</label>
                <input id="eduImage1" />
              </div>
            </div>

            <div class="row">
              <div class="field">
                <label>포인트 1</label>
                <input id="eduPoint1" />
              </div>
              <div class="field">
                <label>포인트 2</label>
                <input id="eduPoint2" />
              </div>
            </div>

            <div class="row">
              <div class="field">
                <label>포인트 3</label>
                <input id="eduPoint3" />
              </div>
              <div class="field">
                <label>포인트 4</label>
                <input id="eduPoint4" />
              </div>
            </div>

            <button class="btn-primary" onclick="addOrUpdateEdu()">상품자료 저장</button>
          </div>

          <div class="list" id="eduList"></div>
        </div>

        <div class="tab-content hidden" id="tab-test">
          <h2 class="section-title">테스트 관리</h2>
          <div class="section-desc">문항, 보기, 정답, 해설을 입력합니다.</div>

          <div class="card">
            <div class="row-3">
              <div class="field">
                <label>순서</label>
                <input id="testOrder" type="number" />
              </div>
              <div class="field">
                <label>정답</label>
                <select id="testAnswer">
                  <option value="1">1번</option>
                  <option value="2">2번</option>
                  <option value="3">3번</option>
                  <option value="4">4번</option>
                </select>
              </div>
              <div class="field">
                <label>문제</label>
                <input id="testTitle" />
              </div>
            </div>

            <div class="row-3">
              <div class="field">
                <label>보기 1</label>
                <input id="testChoice1" />
              </div>
              <div class="field">
                <label>보기 2</label>
                <input id="testChoice2" />
              </div>
              <div class="field">
                <label>보기 3</label>
                <input id="testChoice3" />
              </div>
            </div>

            <div class="row">
              <div class="field">
                <label>보기 4</label>
                <input id="testChoice4" />
              </div>
              <div class="field">
                <label>해설</label>
                <textarea id="testExplanation"></textarea>
              </div>
            </div>

            <button class="btn-primary" onclick="addOrUpdateTest()">문항 저장</button>
          </div>

          <div class="list" id="testList"></div>
        </div>
      </section>
    </div>
  </div>

  <script>
    const STORAGE_KEY = "yurim_telecom_admin_data_v1";

    const defaultData = {
      home: {
        badge: "✨ 실전형 신입 교육 포털",
        title: "유림 텔레콤 현장대응 SOP",
        shortcut1Title: "SOP 바로가기",
        shortcut1Desc: "상황별 응대 매뉴얼을 바로 확인합니다.",
        shortcut2Title: "상품자료 보기",
        shortcut2Desc: "주요 상품과 설명 포인트를 빠르게 확인합니다.",
        shortcut3Title: "테스트 시작",
        shortcut3Desc: "교육 후 이해도 점검을 바로 진행합니다."
      },
      sop: [],
      edu: [],
      test: []
    };

    let state = structuredClone(defaultData);
    let editIndex = { sop:-1, edu:-1, test:-1 };

    function qs(id){ return document.getElementById(id); }

    function setStatus(text, ok = true) {
      const el = qs("saveStatus");
      el.textContent = text;
      el.className = "status " + (ok ? "ok" : "danger");
    }

    function saveAll() {
      collectHomeFields();
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      renderAll();
      setStatus("저장 완료", true);
    }

    function loadAll() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) state = JSON.parse(raw);
      } catch (e) {
        state = structuredClone(defaultData);
      }
      fillHomeFields();
      renderAll();
    }

    function resetAllData() {
      if (!confirm("모든 데이터를 초기화할까?")) return;
      state = structuredClone(defaultData);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      fillHomeFields();
      renderAll();
      resetSopForm();
      resetEduForm();
      resetTestForm();
      setStatus("전체 초기화 완료", true);
    }

    function collectHomeFields() {
      state.home.badge = qs("homeBadge").value.trim();
      state.home.title = qs("homeTitle").value.trim();
      state.home.shortcut1Title = qs("homeShortcut1Title").value.trim();
      state.home.shortcut1Desc = qs("homeShortcut1Desc").value.trim();
      state.home.shortcut2Title = qs("homeShortcut2Title").value.trim();
      state.home.shortcut2Desc = qs("homeShortcut2Desc").value.trim();
      state.home.shortcut3Title = qs("homeShortcut3Title").value.trim();
      state.home.shortcut3Desc = qs("homeShortcut3Desc").value.trim();
    }

    function fillHomeFields() {
      qs("homeBadge").value = state.home.badge || "";
      qs("homeTitle").value = state.home.title || "";
      qs("homeShortcut1Title").value = state.home.shortcut1Title || "";
      qs("homeShortcut1Desc").value = state.home.shortcut1Desc || "";
      qs("homeShortcut2Title").value = state.home.shortcut2Title || "";
      qs("homeShortcut2Desc").value = state.home.shortcut2Desc || "";
      qs("homeShortcut3Title").value = state.home.shortcut3Title || "";
      qs("homeShortcut3Desc").value = state.home.shortcut3Desc || "";
    }

    function addOrUpdateSop() {
      const item = {
        chapter: qs("sopChapter").value.trim(),
        topicTitle: qs("sopTopicTitle").value.trim(),
        topicSummary: qs("sopSummary").value.trim(),
        detailText: qs("sopDetail").value.trim(),
        order: Number(qs("sopOrder").value || 0),
        tags: qs("sopTags").value.trim(),
        video: qs("sopVideo").value.trim(),
        image1: qs("sopImage1").value.trim(),
        image2: qs("sopImage2").value.trim(),
        image3: qs("sopImage3").value.trim()
      };

      if (!item.chapter || !item.topicTitle) {
        setStatus("SOP는 챕터와 주제명이 필요해", false);
        return;
      }

      if (editIndex.sop >= 0) state.sop[editIndex.sop] = item;
      else state.sop.push(item);

      resetSopForm();
      saveAll();
    }

    function editSop(index) {
      const item = state.sop[index];
      editIndex.sop = index;
      qs("sopChapter").value = item.chapter || "";
      qs("sopTopicTitle").value = item.topicTitle || "";
      qs("sopSummary").value = item.topicSummary || "";
      qs("sopDetail").value = item.detailText || "";
      qs("sopOrder").value = item.order || "";
      qs("sopTags").value = item.tags || "";
      qs("sopVideo").value = item.video || "";
      qs("sopImage1").value = item.image1 || "";
      qs("sopImage2").value = item.image2 || "";
      qs("sopImage3").value = item.image3 || "";
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function deleteSop(index) {
      if (!confirm("삭제할까?")) return;
      state.sop.splice(index, 1);
      saveAll();
    }

    function resetSopForm() {
      editIndex.sop = -1;
      ["sopChapter","sopTopicTitle","sopSummary","sopDetail","sopOrder","sopTags","sopVideo","sopImage1","sopImage2","sopImage3"].forEach(id => qs(id).value = "");
    }

    function renderSopList() {
      const list = qs("sopList");
      list.innerHTML = state.sop.map((item, index) => `
        <div class="item">
          <div class="item-top">
            <div>
              <div class="item-title">${escapeHtml(item.topicTitle)}</div>
              <div class="item-sub">${escapeHtml(item.chapter)} / 순서 ${item.order || 0}</div>
            </div>
            <div class="item-actions">
              <button class="btn-secondary mini" onclick="editSop(${index})">수정</button>
              <button class="btn-danger mini" onclick="deleteSop(${index})">삭제</button>
            </div>
          </div>
          <div class="item-sub">${escapeHtml(item.topicSummary || "")}</div>
        </div>
      `).join("") || `<div class="item-sub">등록된 SOP 없음</div>`;
    }

    function addOrUpdateEdu() {
      const item = {
        category: qs("eduCategory").value.trim(),
        title: qs("eduTitle").value.trim(),
        description: qs("eduDesc").value.trim(),
        point1: qs("eduPoint1").value.trim(),
        point2: qs("eduPoint2").value.trim(),
        point3: qs("eduPoint3").value.trim(),
        point4: qs("eduPoint4").value.trim(),
        image1: qs("eduImage1").value.trim(),
        video: qs("eduVideo").value.trim()
      };

      if (!item.category || !item.title) {
        setStatus("상품자료는 카테고리와 제목이 필요해", false);
        return;
      }

      if (editIndex.edu >= 0) state.edu[editIndex.edu] = item;
      else state.edu.push(item);

      resetEduForm();
      saveAll();
    }

    function editEdu(index) {
      const item = state.edu[index];
      editIndex.edu = index;
      qs("eduCategory").value = item.category || "";
      qs("eduTitle").value = item.title || "";
      qs("eduDesc").value = item.description || "";
      qs("eduPoint1").value = item.point1 || "";
      qs("eduPoint2").value = item.point2 || "";
      qs("eduPoint3").value = item.point3 || "";
      qs("eduPoint4").value = item.point4 || "";
      qs("eduImage1").value = item.image1 || "";
      qs("eduVideo").value = item.video || "";
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function deleteEdu(index) {
      if (!confirm("삭제할까?")) return;
      state.edu.splice(index, 1);
      saveAll();
    }

    function resetEduForm() {
      editIndex.edu = -1;
      ["eduCategory","eduTitle","eduDesc","eduPoint1","eduPoint2","eduPoint3","eduPoint4","eduImage1","eduVideo"].forEach(id => qs(id).value = "");
    }

    function renderEduList() {
      const list = qs("eduList");
      list.innerHTML = state.edu.map((item, index) => `
        <div class="item">
          <div class="item-top">
            <div>
              <div class="item-title">${escapeHtml(item.title)}</div>
              <div class="item-sub">${escapeHtml(item.category)}</div>
            </div>
            <div class="item-actions">
              <button class="btn-secondary mini" onclick="editEdu(${index})">수정</button>
              <button class="btn-danger mini" onclick="deleteEdu(${index})">삭제</button>
            </div>
          </div>
          <div class="item-sub">${escapeHtml(item.description || "")}</div>
        </div>
      `).join("") || `<div class="item-sub">등록된 상품자료 없음</div>`;
    }

    function addOrUpdateTest() {
      const item = {
        order: Number(qs("testOrder").value || 0),
        title: qs("testTitle").value.trim(),
        choice1: qs("testChoice1").value.trim(),
        choice2: qs("testChoice2").value.trim(),
        choice3: qs("testChoice3").value.trim(),
        choice4: qs("testChoice4").value.trim(),
        answer: qs("testAnswer").value,
        explanation: qs("testExplanation").value.trim()
      };

      if (!item.title) {
        setStatus("문제를 입력해", false);
        return;
      }

      if (editIndex.test >= 0) state.test[editIndex.test] = item;
      else state.test.push(item);

      resetTestForm();
      saveAll();
    }

    function editTest(index) {
      const item = state.test[index];
      editIndex.test = index;
      qs("testOrder").value = item.order || "";
      qs("testTitle").value = item.title || "";
      qs("testChoice1").value = item.choice1 || "";
      qs("testChoice2").value = item.choice2 || "";
      qs("testChoice3").value = item.choice3 || "";
      qs("testChoice4").value = item.choice4 || "";
      qs("testAnswer").value = item.answer || "1";
      qs("testExplanation").value = item.explanation || "";
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function deleteTest(index) {
      if (!confirm("삭제할까?")) return;
      state.test.splice(index, 1);
      saveAll();
    }

    function resetTestForm() {
      editIndex.test = -1;
      ["testOrder","testTitle","testChoice1","testChoice2","testChoice3","testChoice4","testExplanation"].forEach(id => qs(id).value = "");
      qs("testAnswer").value = "1";
    }

    function renderTestList() {
      const list = qs("testList");
      list.innerHTML = state.test.map((item, index) => `
        <div class="item">
          <div class="item-top">
            <div>
              <div class="item-title">${escapeHtml(item.title)}</div>
              <div class="item-sub">순서 ${item.order || 0} / 정답 ${item.answer}번</div>
            </div>
            <div class="item-actions">
              <button class="btn-secondary mini" onclick="editTest(${index})">수정</button>
              <button class="btn-danger mini" onclick="deleteTest(${index})">삭제</button>
            </div>
          </div>
          <div class="item-sub">${escapeHtml(item.explanation || "")}</div>
        </div>
      `).join("") || `<div class="item-sub">등록된 테스트 없음</div>`;
    }

    function renderAll() {
      renderSopList();
      renderEduList();
      renderTestList();
    }

    function escapeHtml(value = "") {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    document.querySelectorAll(".menu button").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".menu button").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        const tab = btn.dataset.tab;
        document.querySelectorAll(".tab-content").forEach(c => c.classList.add("hidden"));
        qs("tab-" + tab).classList.remove("hidden");
      });
    });

    loadAll();
  </script>
</body>
</html>
